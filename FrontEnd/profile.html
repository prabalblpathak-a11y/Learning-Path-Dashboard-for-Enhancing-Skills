<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<title>Profile - SkillForge</title>
<style>
.nav-item { display:flex; gap:10px; padding:10px; border-radius:10px; transition:all 0.3s ease; }
.nav-item:hover { background:rgba(168,85,247,0.15); color:#a855f7; transform:translateX(5px); }
.active { background:linear-gradient(to right,#7c3aed,#ec4899); color:white !important; box-shadow:0 0 15px rgba(168,85,247,0.6); }
</style>
</head>
<body class="bg-[#0F0F1A] text-white">
<div class="flex h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-[#151528] p-6 border-r border-purple-800 flex-shrink-0">
    <div class="flex items-center gap-3 mb-10">
      <img src="assets/logo.png" class="w-10 h-10 rounded-full border border-purple-500">
      <h2 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">SkillForge</h2>
    </div>
    <ul class="space-y-3 text-gray-400">
      <li><a href="index.html"     class="nav-item">🏠 Dashboard</a></li>
      <li><a href="courses.html"   class="nav-item">📚 Courses</a></li>
      <li><a href="analytics.html" class="nav-item">📊 Analytics</a></li>
      <li><a href="profile.html"   class="nav-item active">👤 Profile</a></li>
      <li><a href="settings.html"  class="nav-item">⚙️ Settings</a></li>
    </ul>
  </div>

  <!-- Main -->
  <div class="flex-1 flex items-center justify-center">
    <div class="bg-[#1E1E2F] p-8 rounded-2xl border border-purple-800 text-center w-96">

      <div class="w-24 h-24 rounded-full bg-purple-800 mx-auto mb-4 flex items-center justify-center text-4xl" id="avatarPlaceholder">👤</div>

      <h2 id="profileName"  class="text-2xl text-purple-400 font-bold">—</h2>
      <p  id="profileEmail" class="text-gray-400 text-sm mb-2">—</p>
      <p  id="profileBio"   class="text-gray-500 text-sm italic mb-4">—</p>

      <div class="flex justify-center gap-8 mb-6">
        <div><p class="text-gray-400 text-xs">XP</p><p id="profileXP"     class="text-pink-400 text-xl font-bold">—</p></div>
        <div><p class="text-gray-400 text-xs">Streak</p><p id="profileStreak" class="text-yellow-400 text-xl font-bold">—</p></div>
      </div>

      <div id="profileAchievements" class="flex justify-center gap-3 mb-6 flex-wrap"></div>

      <a href="settings.html" class="block bg-purple-600 px-4 py-2 rounded-lg hover:bg-purple-700 transition">
        ✏️ Edit Profile
      </a>
    </div>
  </div>
</div>

<script>
const API   = "http://localhost:5000/api";
const token = localStorage.getItem("token");
if (!token) window.location.href = "login.html";

async function loadProfile() {
  const [profileRes, dashRes] = await Promise.all([
    fetch(`${API}/users/me`,            { headers: { "Authorization": `Bearer ${token}` } }),
    fetch(`${API}/users/me/dashboard`,  { headers: { "Authorization": `Bearer ${token}` } })
  ]);
  const user = await profileRes.json();
  const dash = await dashRes.json();

  document.getElementById("profileName").textContent   = user.name;
  document.getElementById("profileEmail").textContent  = user.email;
  document.getElementById("profileBio").textContent    = user.bio || "No bio yet";
  document.getElementById("profileXP").textContent     = user.xp;
  document.getElementById("profileStreak").textContent = user.streak + " 🔥";

  const achBox = document.getElementById("profileAchievements");
  achBox.innerHTML = dash.achievements.length
    ? dash.achievements.map(a => `<div title="${a.name}" class="bg-purple-900 p-2 rounded-lg text-2xl">${a.icon}</div>`).join("")
    : "<p class='text-gray-500 text-sm'>No achievements yet</p>";
}

loadProfile();
</script>
</body>
</html>
